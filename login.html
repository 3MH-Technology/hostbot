<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>الذئب الابيض · ACCESS CONTROL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #050505;
      --card-bg: rgba(15, 15, 20, 0.7);
      --primary: #0A84FF;
      --primary-glow: rgba(10, 132, 255, 0.4);
      --accent: #5E5CE6;
      --text: #FFFFFF;
      --text-muted: #8E8E93;
      --border: rgba(255, 255, 255, 0.08);
      --error: #FF453A;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      top: -25vw;
      left: -25vw;
      z-index: 0;
      filter: blur(80px);
      animation: float 20s infinite alternate ease-in-out;
    }

    body::after {
      content: '';
      position: absolute;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(94, 92, 230, 0.15) 0%, transparent 70%);
      bottom: -20vw;
      right: -20vw;
      z-index: 0;
      filter: blur(80px);
      animation: float 25s infinite alternate-reverse ease-in-out;
    }

    @keyframes float {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(10%, 10%) scale(1.1);
      }
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      position: relative;
      margin-bottom: 32px;
      display: inline-block;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      border-radius: 30px;
      object-fit: cover;
      position: relative;
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo-glow {
      position: absolute;
      inset: -5px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 32px;
      z-index: 1;
      filter: blur(15px);
      opacity: 0.6;
      animation: pulse 4s infinite ease-in-out;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
        filter: blur(10px);
      }

      50% {
        opacity: 0.8;
        filter: blur(18px);
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 40px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .input-group {
      margin-bottom: 16px;
      position: relative;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.1);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #0071E3;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .msg {
      margin-top: 24px;
      font-size: 13px;
      font-weight: 500;
      min-height: 20px;
      transition: color 0.3s;
    }

    .footer {
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* Fancy Loading bar */
    .loading-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      width: 100%;
      display: none;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-glow"></div>
        <img src="https://f.top4top.io/p_37210bgwm1.jpg" alt="Logo" class="logo-img">
      </div>
      <h1>الذئب الابيض</h1>
      <div class="subtitle">System Authentication</div>

      <div class="input-group">
        <input id="u" placeholder="Designation (Username)" autocomplete="username">
      </div>
      <div class="input-group">
        <input id="p" placeholder="Passcode" type="password" autocomplete="current-password">
      </div>

      <button class="btn" onclick="doLogin()">
        <span id="btnText">AUTHENTICATE</span>
        <div class="loading-bar" id="loadBar"></div>
      </button>

      <div class="msg" id="m"></div>

      <div class="footer">
        © 2026 WHITE WOLF PROTOCOL [v2.4.0]<br>
        PROTECTED BY @j49_c
      </div>
    </div>
  </div>

  <script>
    async function doLogin() {
      const m = document.getElementById('m');
      const lb = document.getElementById('loadBar');
      const bt = document.getElementById('btnText');

      m.textContent = '';
      lb.style.display = 'block';
      bt.textContent = 'CONNECTING...';

      const username = document.getElementById('u').value.trim();
      const password = document.getElementById('p').value;

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json().catch(() => ({ success: false, message: 'Encryption mismatch' }));

        if (!r.ok || !d.success) {
          m.style.color = "var(--error)";
          m.textContent = (d.message || 'Verification Failed').toUpperCase();
          lb.style.display = 'none';
          bt.textContent = 'AUTHENTICATE';
          return;
        }

        m.style.color = "#32D74B";
        m.textContent = 'ACCESS GRANTED. INITIALIZING...';
        bt.textContent = 'INITIALIZING...';

        setTimeout(() => {
          window.location.href = d.is_admin ? './admin' : './';
        }, 800);
      } catch (e) {
        m.style.color = "var(--error)";
        m.textContent = "UPLINK ERROR";
        lb.style.display = 'none';
        bt.textContent = 'RETRY';
      }
    }

    // Hit enter to login
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>

</html>
